<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Maxwell-Boltzmann Distribution</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>Распределение Максвелла–Больцмана</h1>

<div class="controls">

<div>
<label>Температура (K)</label>
<input type="range" id="tempSlider" min="50" max="1000" value="300">
<span id="tempValue">300</span>
</div>

<div>
<label>Масса частицы</label>
<input type="range" id="massSlider" min="1" max="10" value="5">
<span id="massValue"></span>
</div>

</div>

<canvas id="chart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
