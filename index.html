<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maxwell Distribution</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Arial;
    margin: 0;
    background: #f3f4f6;
}

header {
    background: #1f2937;
    color: white;
    padding: 10px;
    text-align: center;
}

.container {
    display: flex;
}

.panel {
    width: 300px;
    background: #e5e7eb;
    padding: 10px;
}

.panel label {
    display: block;
    margin-top: 10px;
}

.panel input, select {
    width: 100%;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
}

canvas {
    background: white;
}

</style>
</head>

<body>

<header>
Maxwell–Boltzmann Distribution
</header>

<div class="container">

<div class="panel">

<label>Gas</label>
<select id="gas">
<option value="0.004">He</option>
<option value="0.028">N2</option>
<option value="0.032">O2</option>
<option value="0.044">CO2</option>
<option value="custom">Custom</option>
</select>

<label>Molar mass (kg/mol)</label>
<input id="mass" value="0.028">

<label>Temperature (K)</label>
<input id="temp" value="300">

<button id="add">Add graph</button>
<button id="clear">Clear</button>

</div>

<canvas id="chart" width="800" height="500"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
