<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maxwell Distribution</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f3f4f6;
}

header {
    background: #111827;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    letter-spacing: 1px;
}


/* главный контейнер */

.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
    padding: 20px;
    flex-wrap: wrap;   /* важно чтобы не уезжало */
}


/* панель */

.panel {
    width: 280px;
    background: #ffffff;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
}


/* подписи */

.panel label {
    display: block;
    margin-top: 10px;
    font-size: 14px;
}


/* поля ввода */

.panel input,
.panel select {

    width: 100%;
    padding: 6px;
    margin-top: 4px;

    border-radius: 6px;
    border: 1px solid #ccc;

}



/* кнопки */

button {

    width: 100%;
    margin-top: 12px;
    padding: 10px;

    border: none;
    border-radius: 8px;

    font-size: 14px;
    font-weight: bold;

    cursor: pointer;

    transition: 0.2s;

}


/* add */

#add {
    background: linear-gradient(
        45deg,
        #2563eb,
        #3b82f6
    );
    color: white;
}

#add:hover {
    transform: scale(1.03);
}


/* clear */

#clear {
    background: linear-gradient(
        45deg,
        #ef4444,
        #f87171
    );
    color: white;
}

#clear:hover {
    transform: scale(1.03);
}



/* график */

canvas {

    background: white;

    border-radius: 12px;

    box-shadow:
        0 6px 14px
        rgba(0,0,0,0.15);

    max-width: 100%;

}

</style>

</head>

<body>

<header>
Распределение Максвелла 
</header>

<div class="container">

<div class="panel">

<label>Газ</label>
<select id="gas">

<option value="0.002">H2</option>
<option value="0.004">He</option>
<option value="0.016">CH4</option>
<option value="0.018">H2O</option>
<option value="0.028">N2</option>
<option value="0.032">O2</option>
<option value="0.040">Ar</option>
<option value="0.044">CO2</option>
<option value="0.131">Xe</option>

<option value="custom">Custom</option>

</select>

<label>Молярная масса (кг/моль)</label>
<input id="mass" value="0.028">

<label>Температура (K)</label>
<input id="temp" value="300">

<button id="add">Добавить график</button>
<button id="clear">Удалить графики</button>

</div>

<canvas id="chart" width="900" height="520"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
