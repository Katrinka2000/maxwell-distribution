<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maxwell Distribution</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f3f4f6;
}

header {
    background: #111827;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    letter-spacing: 1px;
}

.container {
    display: flex;
    justify-content: center;
    padding: 20px;
    gap: 20px;
}

.panel {
    width: 280px;
    background: #ffffff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.panel label {
    display: block;
    margin-top: 10px;
    font-size: 14px;
}

.panel input,
.panel select {
    width: 100%;
    padding: 5px;
    margin-top: 3px;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

canvas {
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<header>
Maxwell–Boltzmann Distribution
</header>

<div class="container">

<div class="panel">

<label>Gas</label>
<select id="gas">

<option value="0.002">H2</option>
<option value="0.004">He</option>
<option value="0.016">CH4</option>
<option value="0.018">H2O</option>
<option value="0.028">N2</option>
<option value="0.032">O2</option>
<option value="0.040">Ar</option>
<option value="0.044">CO2</option>
<option value="0.131">Xe</option>

<option value="custom">Custom</option>

</select>

<label>Molar mass (kg/mol)</label>
<input id="mass" value="0.028">

<label>Temperature (K)</label>
<input id="temp" value="300">

<button id="add">Add graph</button>
<button id="clear">Clear</button>

</div>

<canvas id="chart" width="900" height="520"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
